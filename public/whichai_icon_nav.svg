<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 36" width="40" height="36">
  <defs>
    <linearGradient id="wn" x1="2" y1="0" x2="38" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="gn" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Node halos -->
  <circle cx="2"  cy="3"  r="5" fill="#8B5CF6" opacity="0.15"/>
  <circle cx="38" cy="3"  r="5" fill="#06B6D4" opacity="0.15"/>
  <circle cx="20" cy="16" r="4" fill="#4FBFE8" opacity="0.12"/>
  <!-- W stroke -->
  <path d="M2,3 L10,33 L20,16 L30,33 L38,3"
        fill="none"
        stroke="url(#wn)"
        stroke-width="2.6"
        stroke-linecap="round"
        stroke-linejoin="round"/>
  <!-- Node dots -->
  <circle cx="2"  cy="3"  r="3"   fill="#8B5CF6" filter="url(#gn)"/>
  <circle cx="10" cy="33" r="2.5" fill="#9B68F4"/>
  <circle cx="20" cy="16" r="3"   fill="#3DC4E2" filter="url(#gn)"/>
  <circle cx="30" cy="33" r="2.5" fill="#0FC8DA"/>
  <circle cx="38" cy="3"  r="3"   fill="#06B6D4" filter="url(#gn)"/>
</svg>
